# ==========================================
# G\u0141\u00D3WNY PLIK KONFIGURACYJNY SYMULACJI
# ==========================================

# --- 1. \u015ARODOWISKO I SILNIK ---
# Wymiary siatki \u015Bwiata symulacji (w jednostkach logicznych)
world.width=100
world.height=100
# Rozmiar pojedynczej kom\u00F3rki dla SpatialManagera (optymalizacja zapyta\u0144 przestrzennych)
world.cellSize=5.0
# Co ile epok agenci starzej\u0105 si\u0119 o 1 rok (np. 12 epok = 1 rok w symulacji)
simulation.ageRate=12
# Bazowa warto\u015B\u0107 zagro\u017Cenia dla kontekstu podejmowania decyzji (min: 0.0)
simulation.baseContextValue=0.01

# --- 2. GUI I STATYSTYKI ---
# Skala renderowania (ile pikseli zajmuje 1 jednostka \u015Bwiata)
gui.mapScale=7
# Promie\u0144 w jednostkach \u015Bwiata, w jakim klikni\u0119cie mysz\u0105 "\u0142apie" agenta do Inspektora
gui.clickRadius=2.0
# Pr\u0119dko\u015Bci dzia\u0142ania symulacji (w milisekundach na epok\u0119)
gui.timerDelayMin=10
gui.timerDelayMax=1000
gui.timerDelayInitial=100
# Nazwa pliku wyj\u015Bciowego dla zrzutu historii
stats.exportFilename=wyniki_symulacji.csv
# Wizualizacja chmury infekcji (GUI)
gui.infectionFieldMaxAlpha=150
gui.infectionFieldAlphaMultiplier=250.0

# --- 3. INFRASTRUKTURA MEDYCZNA ---
# Liczba szpitali i liczba \u0142\u00F3\u017Cek w ka\u017Cdym z nich
hospital.count=2
hospital.capacity=50
# O ile szybciej spada licznik infekcji w szpitalu (warto\u015B\u0107 dodawana do naturalnego spadku)
medical.hospitalHealingBoost=2
# Koordynaty pocz\u0105tkowych szpitali
hospital.0.x=20
hospital.0.y=20
hospital.1.x=80
hospital.1.y=80

# --- 4. WIRUS I EPIDEMIOLOGIA ---
# Bazowa szansa na zara\u017Cenie w bliskim kontakcie (0.0 - 1.0)
virus.defaultProb=0.75
# Zasi\u0119g dzia\u0142ania wirusa w jednostkach mapy
virus.defaultRadius=5.0
# Czas trwania choroby u nieleczonego agenta (w epokach)
virus.defaultDuration=30
# Prawdopodobie\u0144stwo, \u017Ce agent przejdzie zaka\u017Cenie bezobjawowo jako nosiciel (0.0 - 1.0)
infection.carrierProbability=0.7
# Mno\u017Cnik zara\u017Aliwo\u015Bci dla nosicieli bezobjawowych (CARRIER)
infection.carrierMultiplier=0.5
# Parametry chmury zaka\u017Anej (InfectionField)
infectionField.defaultExpiration=15
infectionField.dissipationRate=0.05
infectionField.minInfectivity=0.01
# Mno\u017Cnik okre\u015Blaj\u0105cy, jak silny jest aerozol w stosunku do bezpo\u015Bredniego kontaktu
infectionField.aerosolMultiplier=0.3

# --- 5. BIOLOGIA I GATUNKI ---
# Wiek dojrza\u0142o\u015Bci oraz zjadliwo\u015B\u0107 przenoszonego wirusa per gatunek
species.human.virulence=1.0
species.human.maturity=18
species.bat.virulence=2.5
species.bat.maturity=2
species.dog.virulence=1.3
species.dog.maturity=7
species.rat.virulence=1.8
species.rat.maturity=1

# --- 6. AGENT I CZ\u0141OWIEK - STATYSTYKI ---
# Domy\u015Blny mno\u017Cnik podatno\u015Bci na wirusa (1.0 = normalna podatno\u015B\u0107)
agent.defaultVulnerability=1.0
# Bazowa, p\u0142aska szansa na naturaln\u0105 \u015Bmier\u0107
agent.defaultNaturalMortality=0.01
# Ochrona wrodzona (resistance) na start i dla nowo narodzonych dzieci
human.initialResistance=0.1
human.offspringResistance=0.2
# Skuteczno\u015B\u0107 zabezpiecze\u0144 (mno\u017Cniki podatno\u015Bci - im mniej, tym lepiej chroni\u0105)
vulnerability.maskMultiplier=0.3
vulnerability.vaccineMultiplier=0.1

# --- 7. ROZMNA\u017BANIE ---
# Szansa na rozmno\u017Cenie w kontakcie z partnerem (0.0 - 1.0)
reproduction.chance=0.8
# Czas odnowienia po narodzinach dziecka (w epokach) - ZAKRES (Jitter)
reproduction.cooldownMin=30
reproduction.cooldownMax=50
# Maksymalny dystans poszukiwania partnera do rozrodu
reproduction.matingRange=3.0
reproduction.seekMateProbability=0.2

# --- 8. PSYCHOLOGIA I STRATEGIE DECYZYJNE ---
# Pr\u00F3g infekcji (0.0-1.0), po kt\u00F3rym Racjonalny agent zak\u0142ada mask\u0119 i dystansuje si\u0119
rational.infectionThreshold=0.20
# Liczba pozosta\u0142ych epok infekcji, przy kt\u00F3rej Racjonalny agent zg\u0142asza si\u0119 do szpitala
rational.hospitalEpochThreshold=5
# Pr\u00F3g infekcji, po kt\u00F3rym Spanikowany agent wpada w panik\u0119 (znacznie ni\u017Cszy)
panicked.infectionThreshold=0.05

# --- 9. STRATEGIE \u015AMIERTELNO\u015ACI ---
# Parametry krzywej sigmoidalnej dla zgon\u00F3w
# Bazowa zjadliwo\u015B\u0107 choroby (0.0 - 1.0)
sigmoid.baseLethality=0.02
# Stromo\u015B\u0107 krzywej umieralno\u015Bci naturalnej (im wy\u017Csza, tym szybciej szansa ro\u015Bnie po x0)
sigmoid.k=0.15
# Wiek, w kt\u00F3rym szansa na zgon naturalny wynosi 50%
sigmoid.x0=80
# Mno\u017Cnik \u015Bmiertelno\u015Bci dla pacjent\u00F3w w szpitalu (0.1 redukuje \u015Bmiertelno\u015B\u0107 o 90%)
sigmoid.hospitalMultiplier=0.1
# Sztywny pr\u00F3g wiekowy dla podstawowej strategii \u015Bmiertelno\u015Bci
mortality.maxAge=100

# --- 10. STRATEGIE RUCHU ---
# Promie\u0144 postrzegania dla strategii Dystansowania Spo\u0142ecznego
movement.distancing.radius=5.0
# Maksymalna liczba kratek przesuni\u0119cia w jednym kroku dla Random Walk (3 = od -1 do 1)
movement.random.stepRange=3
# Promie\u0144 poszukiwania partnera do rozrodu
movement.seekMate.radius=15.0
# Promie\u0144 poszukiwania ofiary przez m\u015Bciwego agenta
movement.malicious.radius=10.0
# Liczba epok oczekiwania na wej\u015Bcie do szpitala, po kt\u00F3rej agent wpada w furi\u0119
vindictive.frustrationThreshold=10
# Odleg\u0142o\u015B\u0107 od \u015Bciany, przy kt\u00F3rej agent zaczyna czu\u0107 odpychanie
movement.boundary.margin = 3.0
# Waga odpychania od \u015Bcian
movement.boundary.forceWeight = 2.0
# Waga odpychania od innych agent\u00F3w
movement.socialForceWeight = 1.0


# --- 11. INICJALIZACJA POPULACJI ---
# Pocz\u0105tkowa liczba jednostek na mapie
pop.humans=450
pop.bats=10
pop.rats=10
pop.dogs=10
# Zakresy wiekowe i proporcje
human.minAge=20
human.maxAgeRange=40
human.speed=1.0
# Odsetek ludzi zachowuj\u0105cych si\u0119 racjonalnie (0.0 - 1.0)
human.rationalRatio=0.5

animal.defaultAge=2
animal.speed=1.5